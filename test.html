<!DOCTYPE html>
<html>
<head>
  <title>Purrora | Admin</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    header {
      position: fixed;   /* keeps it stuck at the top */
      top: 0;
      left: 0;
      width: 100%;
      background: #222;  /* dark background for retro feel */
      color: white;
      padding: 10px;
      text-align: center;
      z-index: 1000;     /* ensures it stays above other content */
    }
    nav {
      margin-top: 10px;
    }
    nav button {
      margin: 5px;
      padding: 8px 12px;
      background: #444;
      color: white;
      border: none;
      cursor: pointer;
    }
    nav button:hover {
      background: #666;
    }
    main {
      margin-top: 120px; /* pushes content below the fixed header */
      padding: 20px;
    }
    .tab { display: none; }
    .active { display: block; }
    footer {
      text-align: center;
      padding: 10px;
      background: #222;
      color: white;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>🐾 Purrora | Admin</h1>
    <nav>
      <button onclick="showTab('dashboard')">Dashboard</button>
      <button onclick="showTab('animals')">Animals</button>
      <button onclick="showTab('settings')">Settings</button>
    </nav>
  </header>

  <main>
    <section id="dashboard" class="tab active">
      <h2>Welcome to Purrora</h2>
      <p>Poetic text, logo, sunrise background here...</p>
    </section>

    <section id="animals" class="tab">
      <h2>Manage Animals</h2>
      <form id="animalForm">
        <input type="text" id="animalName" name="name" placeholder="Animal Name" required>
        <input type="text" id="animalSpecies" name="species" placeholder="Species" required>
        <input type="text" id="animalColor" name="color" placeholder="Color" required>
        <input type="number" id="animalAge" name="age" placeholder="Age" min="0" required>
        <select id="animalGender" name="gender" required>
          <option value="">Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
        <select id="animalHealth" name="health_status" required>
          <option value="">Select Health Status</option>
          <option value="Healthy">Healthy</option>
          <option value="Under Treatment">Under Treatment</option>
        </select>
        <button type="submit">Add</button>
      </form>
      <table id="animalsTable" border="1" style="margin-top: 20px; width: 100%; border-collapse: collapse;">
        <thead>
          <tr style="background: #444; color: white;">
            <th>ID</th>
            <th>Name</th>
            <th>Species</th>
            <th>Color</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Health Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="animalsList">
        </tbody>
      </table>
    </section>

    <section id="settings" class="tab">
      <h2>Settings</h2>
      <label><input type="checkbox" onclick="toggleDark()"> Dark Mode</label>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Purrora Animal Center</p>
  </footer>

  <script src="JS/api_logic.js"></script>
  <script>
    function showTab(tabId) {
      document.querySelectorAll('.tab').forEach(div => div.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
    }
    function toggleDark() {
      document.body.classList.toggle('dark');
    }
  </script>
</body>
</html>
